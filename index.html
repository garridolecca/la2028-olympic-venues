<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA 2028 Olympics — Venue Monitor</title>

  <!--
    Import map: maps the bare "@arcgis/core/" specifier to the ESM CDN.
    This lets every JS module use clean  import X from "@arcgis/core/X.js"
    with no build step.
  -->
  <script type="importmap">
  {
    "imports": {
      "@arcgis/core/": "https://js.arcgis.com/4.29/@arcgis/core/"
    }
  }
  </script>

  <!-- ArcGIS dark theme CSS (ESM CDN assets path) -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/@arcgis/core/assets/esri/themes/dark/main.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ====== HEADER ====== -->
<header id="header">
  <div class="brand">
    <div class="rings">
      <div class="ring r-blue"></div>
      <div class="ring r-gold"></div>
      <div class="ring r-black"></div>
      <div class="ring r-green"></div>
      <div class="ring r-red"></div>
    </div>
    <div>
      <div class="brand-title">LA 2028 Olympic Venues</div>
      <div class="brand-sub">Venue Monitor &amp; Area Demographics</div>
    </div>
  </div>

  <div class="api-box">
    <label>&#128273; ArcGIS API Key</label>
    <input type="password" id="apiKey"
           placeholder="Paste your ArcGIS API key to enable demographics&hellip;" />
    <div class="api-dot" id="apiDot" title="API key status"></div>
  </div>
</header>

<!-- ====== LEFT PANEL ====== -->
<div id="leftPanel">
  <div class="panel-hd">
    <h2>&#127941; 20 Olympic Venues</h2>
    <input type="search" class="search-input" id="venueSearch"
           placeholder="Search by name, sport or city&hellip;" />
  </div>
  <div id="venueList"></div>
</div>

<!-- ====== MAP ====== -->
<div id="viewDiv"></div>

<!-- ====== LEGEND ====== -->
<div id="legend">
  <div class="leg-row"><div class="leg-dot" style="background:#c8a951"></div> Indoor Arena</div>
  <div class="leg-row"><div class="leg-dot" style="background:#00aaff"></div> Outdoor / Stadium</div>
  <div class="leg-row"><div class="leg-dot" style="background:#00dd88"></div> Athletes Village</div>
</div>

<!-- ====== RIGHT SIDEBAR ====== -->
<div id="sidebar">
  <div class="sb-head">
    <div class="sb-badge" id="sbBadge">Venue</div>
    <div class="sb-name"  id="sbName">&mdash;</div>
    <div class="sb-loc"   id="sbLoc">&mdash;</div>
    <button class="sb-close" id="sbClose">&#x2715;</button>
  </div>

  <div class="sb-sec">
    <div class="sb-sec-title">About this Venue</div>
    <div class="sb-desc" id="sbDesc">&mdash;</div>
  </div>

  <div class="sb-sec">
    <div class="sb-sec-title">Sports &amp; Events</div>
    <div class="chips" id="sbSports"></div>
  </div>

  <div class="sb-sec">
    <div class="sb-sec-title">Venue Details</div>
    <div class="igrid" id="sbInfo"></div>
  </div>

  <div class="demo-wrap">
    <div class="sb-sec-title" style="margin-bottom:12px;">Area Demographics (1-Mile Radius)</div>
    <div id="demoContent">
      <div class="no-key-msg">Enter your ArcGIS API Key in the header<br/>to unlock live area demographics</div>
    </div>
  </div>
</div>

<!-- ====== TOOLTIP ====== -->
<div id="tip"></div>

<!-- ES module entry point -->
<script type="module" src="js/main.js"></script>
</body>
</html>
